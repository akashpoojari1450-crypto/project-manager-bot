<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Project Manager AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 50%, #2563EB 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(79,70,229,0.3);
  }
  .logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 12px;
    box-shadow: 0 8px 20px rgba(79,70,229,0.4);
  }
  .logo h1 { font-size: 22px; font-weight: 800; color: #111827; letter-spacing: -0.5px; }
  .logo p { font-size: 13px; color: #6B7280; margin-top: 4px; }

  .tabs {
    display: flex;
    background: #F3F4F6;
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: #6B7280;
    font-family: inherit;
  }
  .tab-btn.active {
    background: white;
    color: #4F46E5;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #E5E7EB;
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
    background: #F9FAFB;
    color: #111827;
  }
  .form-group input:focus {
    border-color: #4F46E5;
    background: white;
    box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  }

  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #4F46E5, #7C3AED);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(79,70,229,0.4);
    margin-top: 4px;
  }
  .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.5); }
  .submit-btn:active { transform: translateY(0); }

  .msg {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    padding: 10px;
    border-radius: 10px;
    margin-top: 14px;
    display: none;
  }
  .msg.success { background: #D1FAE5; color: #059669; }
  .msg.error { background: #FEE2E2; color: #EF4444; }

  .features {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #F3F4F6;
  }
  .feature { text-align: center; }
  .feature-icon { font-size: 20px; margin-bottom: 4px; }
  .feature-text { font-size: 11px; color: #9CA3AF; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Project Manager AI</h1>
    <p>Autonomous AI-Powered Project Management</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter your username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password">
    </div>
    <button class="submit-btn" onclick="login()">Sign In →</button>
    <div id="loginMsg" class="msg"></div>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUser" placeholder="Choose a username">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPass" placeholder="Create a password">
    </div>
    <button class="submit-btn" onclick="register()">Create Account →</button>
    <div id="registerMsg" class="msg"></div>
  </div>

  <div class="features">
    <div class="feature">
      <div class="feature-icon">🧠</div>
      <div class="feature-text">AI Briefings</div>
    </div>
    <div class="feature">
      <div class="feature-icon">⚠️</div>
      <div class="feature-text">Risk Engine</div>
    </div>
    <div class="feature">
      <div class="feature-icon">📄</div>
      <div class="feature-text">Auto Reports</div>
    </div>
    <div class="feature">
      <div class="feature-icon">💬</div>
      <div class="feature-text">AI Chat</div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function login() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value.trim();
  if (!username || !password) { showMsg('loginMsg', 'Please fill all fields', 'error'); return; }
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password, email: ''})
  });
  const data = await res.json();
  if (data.message === 'Login successful') {
    showMsg('loginMsg', '✅ Welcome back! Redirecting...', 'success');
    setTimeout(() => window.location.href = '/', 800);
  } else {
    showMsg('loginMsg', data.error || 'Login failed', 'error');
  }
}

async function register() {
  const username = document.getElementById('regUser').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value.trim();
  if (!username || !email || !password) { showMsg('registerMsg', 'Please fill all fields', 'error'); return; }
  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, email, password})
  });
  const data = await res.json();
  if (data.message) {
    showMsg('registerMsg', '✅ Account created! Signing in...', 'success');
    setTimeout(() => switchTab('login'), 1500);
  } else {
    showMsg('registerMsg', data.error || 'Registration failed', 'error');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.getElementById('loginForm').style.display !== 'none';
    if (active) login(); else register();
  }
});
</script>
</body>
</html>
