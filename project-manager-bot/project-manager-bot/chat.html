<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Chat | Project Manager AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #F0F4FF; height: 100vh; display: flex; flex-direction: column; }

.navbar {
  background: linear-gradient(135deg, #1D4ED8, #2563EB);
  color: white; padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 2px 12px rgba(29,78,216,0.3);
}
.navbar h1 { font-size: 18px; font-weight: 800; }
.nav-right { display: flex; gap: 8px; align-items: center; }
.nav-btn {
  background: rgba(255,255,255,0.15); color: white;
  border: 1px solid rgba(255,255,255,0.25);
  padding: 7px 14px; border-radius: 20px;
  cursor: pointer; font-size: 13px; font-weight: 600;
  font-family: inherit; text-decoration: none;
  transition: all 0.2s;
}
.nav-btn:hover { background: rgba(255,255,255,0.25); }

.chat-layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 220px; background: white;
  border-right: 1px solid #E5E7EB;
  display: flex; flex-direction: column;
  box-shadow: 2px 0 8px rgba(0,0,0,0.05);
}
.sidebar-title {
  padding: 16px; font-size: 13px; font-weight: 700;
  color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px;
  border-bottom: 1px solid #E5E7EB;
}
.room-btn {
  padding: 13px 16px; cursor: pointer; font-size: 14px;
  font-weight: 500; color: #374151; border: none;
  background: none; text-align: left; width: 100%;
  font-family: inherit; transition: all 0.15s;
  border-left: 3px solid transparent;
}
.room-btn:hover { background: #F0F4FF; color: #1D4ED8; }
.room-btn.active { background: #EFF6FF; color: #1D4ED8; font-weight: 700; border-left-color: #1D4ED8; }
.online-section { padding: 16px; border-top: 1px solid #E5E7EB; margin-top: auto; }
.online-title { font-size: 12px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; margin-bottom: 8px; }
.online-user { font-size: 13px; color: #374151; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.online-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; }

/* Main chat area */
.chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.chat-header {
  padding: 16px 20px; background: white;
  border-bottom: 1px solid #E5E7EB;
  display: flex; align-items: center; gap: 12px;
}
.chat-header-icon { font-size: 24px; }
.chat-header-info h2 { font-size: 16px; font-weight: 700; color: #111827; }
.chat-header-info p { font-size: 12px; color: #9CA3AF; }
.online-count { margin-left: auto; background: #D1FAE5; color: #059669; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }

.messages-area {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 4px;
  background: #F8FAFF;
}

.msg-group { margin-bottom: 12px; }
.msg-wrap { display: flex; gap: 10px; align-items: flex-start; padding: 2px 0; }
.msg-wrap.me { flex-direction: row-reverse; }
.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #1D4ED8, #2563EB);
  color: white; display: flex; align-items: center;
  justify-content: center; font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.msg-avatar.me-avatar { background: linear-gradient(135deg, #059669, #10B981); }
.msg-bubble {
  max-width: 65%; padding: 10px 14px;
  border-radius: 16px; font-size: 14px; line-height: 1.5;
  background: white; color: #111827;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  border-bottom-left-radius: 4px;
}
.msg-wrap.me .msg-bubble {
  background: linear-gradient(135deg, #1D4ED8, #2563EB);
  color: white; border-bottom-left-radius: 16px;
  border-bottom-right-radius: 4px;
}
.msg-meta { font-size: 11px; color: #9CA3AF; margin-top: 4px; }
.msg-wrap.me .msg-meta { text-align: right; }
.system-msg { text-align: center; color: #9CA3AF; font-size: 12px; padding: 8px; }

/* Input area */
.input-area {
  padding: 16px 20px; background: white;
  border-top: 1px solid #E5E7EB;
  display: flex; gap: 10px; align-items: flex-end;
}
.msg-input {
  flex: 1; border: 1.5px solid #E5E7EB; border-radius: 12px;
  padding: 12px 16px; font-size: 14px; font-family: inherit;
  outline: none; resize: none; max-height: 120px;
  transition: border 0.2s; background: #F9FAFB;
}
.msg-input:focus { border-color: #1D4ED8; background: white; }
.send-btn {
  background: linear-gradient(135deg, #1D4ED8, #2563EB);
  color: white; border: none; border-radius: 12px;
  padding: 12px 18px; cursor: pointer; font-size: 18px;
  height: 48px; transition: all 0.2s;
}
.send-btn:hover { opacity: 0.9; transform: translateY(-1px); }

.connecting { text-align: center; padding: 40px; color: #9CA3AF; }
</style>
</head>
<body>

<div class="navbar">
  <h1>💬 Team Chat</h1>
  <div class="nav-right">
    <span id="username-display" style="font-size:13px;opacity:0.9"></span>
    <a class="nav-btn" href="/">🏠 Dashboard</a>
    <a class="nav-btn" href="/teams-page">👥 Teams</a>
  </div>
</div>

<div class="chat-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">💬 Channels</div>
    <button class="room-btn active" onclick="switchRoom('general')"># general</button>
    <button class="room-btn" onclick="switchRoom('urgent')"># urgent</button>
    <button class="room-btn" onclick="switchRoom('announcements')"># announcements</button>
    <button class="room-btn" onclick="switchRoom('random')"># random</button>

    <div class="online-section">
      <div class="online-title">Online</div>
      <div id="online-users"></div>
    </div>
  </div>

  <!-- Main Chat -->
  <div class="chat-main">
    <div class="chat-header">
      <div class="chat-header-icon">#</div>
      <div class="chat-header-info">
        <h2 id="room-name">general</h2>
        <p id="room-desc">General team discussion</p>
      </div>
      <div class="online-count" id="online-count">● 1 online</div>
    </div>

    <div class="messages-area" id="messages">
      <div class="connecting">Connecting to chat...</div>
    </div>

    <div class="input-area">
      <textarea class="msg-input" id="msgInput" placeholder="Message #general..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
let ws = null;
let currentRoom = 'general';
let myUsername = '';
let onlineUsers = new Set();

const roomDescs = {
  general: 'General team discussion',
  urgent: 'Urgent tasks and issues',
  announcements: 'Important announcements',
  random: 'Off-topic conversations'
};

async function init() {
  const res = await fetch('/me');
  if (res.status === 401) { window.location.href = '/login-page'; return; }
  const user = await res.json();
  myUsername = user.username;
  document.getElementById('username-display').innerText = '👤 ' + myUsername;
  connectWS('general');
}

function connectWS(room) {
  if (ws) { ws.close(); }

  currentRoom = room;
  document.getElementById('room-name').textContent = room;
  document.getElementById('room-desc').textContent = roomDescs[room] || room;
  document.getElementById('messages').innerHTML = '<div class="connecting">Connecting...</div>';
  document.getElementById('msgInput').placeholder = 'Message #' + room + '...';

  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = protocol + '//' + window.location.host + '/ws/chat/' + room;
  ws = new WebSocket(wsUrl);

  ws.onopen = function() {
    document.getElementById('messages').innerHTML = '';
    onlineUsers = new Set([myUsername]);
    updateOnlineCount();
  };

  ws.onmessage = function(event) {
    const data = JSON.parse(event.data);
    if (data.type === 'message' || data.type === 'history') {
      appendMessage(data.username, data.message, data.timestamp, data.username === myUsername);
      if (data.type === 'message') onlineUsers.add(data.username);
    } else if (data.type === 'system') {
      appendSystem(data.message);
      if (data.message.includes('joined')) {
        const u = data.message.split(' joined')[0];
        onlineUsers.add(u);
      } else if (data.message.includes('left')) {
        const u = data.message.split(' left')[0];
        onlineUsers.delete(u);
      }
      updateOnlineCount();
      updateOnlineList();
    }
  };

  ws.onclose = function() {
    appendSystem('Disconnected. Reconnecting in 3s...');
    setTimeout(function() { connectWS(currentRoom); }, 3000);
  };

  ws.onerror = function() {
    appendSystem('Connection error.');
  };
}

function switchRoom(room) {
  document.querySelectorAll('.room-btn').forEach(function(b) {
    b.classList.toggle('active', b.textContent.includes(room));
  });
  connectWS(room);
}

function appendMessage(username, message, timestamp, isMe) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'msg-wrap' + (isMe ? ' me' : '');
  var initial = username.charAt(0).toUpperCase();
  div.innerHTML =
    '<div class="msg-avatar' + (isMe ? ' me-avatar' : '') + '">' + initial + '</div>' +
    '<div>' +
      '<div class="msg-bubble">' + escapeHtml(message) + '</div>' +
      '<div class="msg-meta">' + (isMe ? 'You' : username) + ' · ' + (timestamp || '') + '</div>' +
    '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendSystem(text) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'system-msg';
  div.textContent = '— ' + text + ' —';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function updateOnlineCount() {
  document.getElementById('online-count').textContent = '● ' + onlineUsers.size + ' online';
}

function updateOnlineList() {
  var html = '';
  onlineUsers.forEach(function(u) {
    html += '<div class="online-user"><span class="online-dot"></span>' + u + '</div>';
  });
  document.getElementById('online-users').innerHTML = html;
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  var msg = input.value.trim();
  if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({message: msg}));
  input.value = '';
  input.style.height = 'auto';
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
